services:
  postgres:
    image: postgres:16-alpine
    container_name: db_closet
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./db_closet:/var/lib/postgresql/data
      - ./init1.sql:/docker-entrypoint-initdb.d/init.sql 
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge