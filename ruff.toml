line-length = 100
target-version = "py312"

[lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ASYNC"]
ignore = [
    "B008",  # FastAPI dependencies are function calls in defaults by design
    "E501",  # long lines are caught by the formatter
]

[lint.per-file-ignores]
"tests/*" = ["S101"]           # asserts are the point
"alembic/versions/*" = ["E"]   # generated files
# Interactive prompts block the event loop on purpose: manage_admin.py is a
# single-user CLI waiting on a human, not a server handling concurrent work.
"scripts/manage_admin.py" = ["ASYNC250"]