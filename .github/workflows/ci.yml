name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: lint + tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: closet
          POSTGRES_PASSWORD: closet
          POSTGRES_DB: closet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U closet -d closet_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: test
      DEBUG: "true"
      POSTGRES_USER: closet
      POSTGRES_PASSWORD: closet
      POSTGRES_DB: closet_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      JWT_SECRET: ci-secret-not-used-anywhere-else

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check app tests

      - name: Migrations apply cleanly
        run: alembic upgrade head

      - name: Migrations are reversible
        run: alembic downgrade base && alembic upgrade head

      - name: Tests
        run: pytest -q

  build:
    name: docker image builds
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build runtime image
        run: docker build -f docker/Dockerfile --target runtime -t closet-api:ci .